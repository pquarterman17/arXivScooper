<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dev Harness — arXivScooper</title>
<style>
  /* Plain dark sidebar layout — keep this stylesheet local so the harness
     doesn't entangle with the production CSS.  Keeps stories' visuals
     close to what they'd look like in-app without inheriting page-level
     state. */
  :root {
    color-scheme: dark;
    --bg: #0e1117; --bg2: #161b22; --bg3: #21262d;
    --text: #c9d1d9; --text2: #8b949e; --text3: #6e7681;
    --border: #30363d; --accent: #58a6ff;
    --green: #3fb950; --orange: #f0883e;
  }
  body {
    margin: 0;
    background: var(--bg); color: var(--text);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    display: grid; grid-template-columns: 220px 1fr; min-height: 100vh;
  }
  aside {
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 16px 0; overflow-y: auto;
  }
  aside h1 {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    color: var(--text3); padding: 0 16px; margin: 0 0 8px;
    letter-spacing: 0.04em;
  }
  aside .group { margin-bottom: 16px; }
  aside button {
    background: none; border: none; color: var(--text2);
    width: 100%; text-align: left; padding: 6px 16px;
    font-size: 13px; cursor: pointer;
  }
  aside button:hover { background: var(--bg3); color: var(--text); }
  aside button.active {
    background: var(--bg3); color: var(--accent);
    border-left: 2px solid var(--accent); padding-left: 14px;
  }
  main {
    padding: 24px 32px; overflow-y: auto;
    display: grid; grid-template-rows: auto 1fr; gap: 12px;
  }
  main header {
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }
  main header h2 { font-size: 16px; margin: 0; }
  main header p { margin: 4px 0 0; color: var(--text3); font-size: 12px; }
  main #stage {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px; min-height: 200px;
  }
  main #state-dump {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; color: var(--text2); white-space: pre-wrap;
    max-height: 200px; overflow: auto;
  }

  /* Re-purpose a few real classes the schema-form expects so it renders
     visibly in the harness. */
  .form-row { display: grid; grid-template-columns: 200px 1fr; gap: 12px; align-items: center; padding: 8px 0; }
  .form-label { color: var(--text2); font-size: 12px; }
  .form-row input[type="text"], .form-row input[type="number"], .form-row select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 10px; font: inherit;
  }
  .form-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .form-array { border-left: 2px solid var(--border); padding-left: 12px; margin: 8px 0; }
  .form-array-item { display: flex; gap: 8px; margin: 4px 0; align-items: center; }
  .form-array button { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
  .form-section { margin: 12px 0; padding: 8px 0; border-top: 1px solid var(--border); }
  .form-section > .form-label { font-weight: 600; color: var(--text); }
</style>
</head>
<body>
<aside>
  <div class="group">
    <h1>schema-form</h1>
    <div id="story-list"></div>
  </div>
</aside>
<main>
  <header>
    <h2 id="story-title">Pick a story</h2>
    <p id="story-desc">Click a story on the left to render it here.</p>
  </header>
  <div id="stage"></div>
  <pre id="state-dump"></pre>
</main>

<script type="module" src="src/dev/index.js"></script>
</body>
</html>
