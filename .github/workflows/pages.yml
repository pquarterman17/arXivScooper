name: Deploy to GitHub Pages

# Publishes a read-only demo of the app at
# https://pquarterman17.github.io/arXivScooper/paper_database.html
#
# How it works:
#   - Triggered on every push to main (after Tests workflow passes — see
#     `needs:` and the workflow_run gate below).
#   - Uploads the static assets the browser needs (HTML, modules, the
#     SQLite DB, the legacy globals) to GitHub Pages.
#   - The arXiv API proxy in scq/server.py is NOT available on Pages (no
#     Python). The HTML auto-detects this and falls back to public CORS
#     proxies; the "browse the existing DB" path works fully, but
#     "fetch new papers" is best-effort on the demo.
#
# Required one-time setup in the repo:
#   Settings → Pages → Source = "GitHub Actions"

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploys serialize — only one in flight at a time. Cancel earlier
# in-flight runs when a newer commit lands so the latest main wins.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site files
        # Copy only what the running browser needs. Skips Python tools,
        # tests, .github, .claude, plans/ — none of those serve a
        # purpose at the URL and they only inflate the upload.
        run: |
          mkdir -p _site
          cp paper_database.html paper_scraper.html _site/
          cp scraper_config.js db_utils.js _site/
          cp -r src _site/
          mkdir -p _site/data
          cp data/arxiv_scooper.db _site/data/ 2>/dev/null || echo "no DB checked in (Pages demo will start empty)"
          cp references.bib references.txt _site/ 2>/dev/null || true

          # Add a small banner so visitors know this is a read-only demo.
          # Inject just before </body> in paper_database.html.
          cat > /tmp/banner.html <<'EOF'
          <div style="position:fixed;bottom:0;left:0;right:0;background:#000a;color:#fff;padding:6px 12px;font:12px/1.4 system-ui;text-align:center;z-index:9999">
            Demo build — local changes (notes, ratings, new papers) are saved in your browser only. Source: <a href="https://github.com/pquarterman17/arXivScooper" style="color:#7af">github.com/pquarterman17/arXivScooper</a>
          </div>
          EOF
          # Insert banner before </body> in both HTML pages.
          for f in _site/paper_database.html _site/paper_scraper.html; do
            python3 -c "
          import sys
          with open('$f') as fh: html = fh.read()
          with open('/tmp/banner.html') as bh: banner = bh.read()
          html = html.replace('</body>', banner + '</body>', 1)
          with open('$f', 'w') as fh: fh.write(html)
          "
          done

          ls -la _site/
          du -sh _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
