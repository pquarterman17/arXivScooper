name: SCQ arXiv Daily Digest

on:
  schedule:
    # Same-day delivery: arXiv announces new submissions ~20:00 US Eastern
    # (Sun–Thu), which reaches the API around 00:00–01:00 UTC. Running at
    # ~04:00 UTC fires safely AFTER that announcement, so the digest covers
    # the batch that went live the same evening rather than catching it the
    # next morning. 04:00 UTC = 11 PM EST (winter) / 12 AM EDT (summer).
    # The off-round minute (04:23, not 04:00) avoids GitHub's top-of-hour
    # scheduler pile-up, which is what dragged the old :00 cron to ~13:00.
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to look back (1 = today only, 7 = past week, 14 = two weeks)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '14'
          - '30'

permissions:
  contents: read  # Digests are artifacts; dedup state lives in actions/cache
  issues: write   # Failure handler opens/comments on digest-failure issues

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cross-run dedup state (sent arXiv IDs). The unique run_id primary key
      # never hits, so the post-job step always saves a fresh cache; the
      # restore-keys prefix pulls the most recent prior state into the
      # workspace before the digest runs. No repo writes, no branch-protection
      # concerns. If the cache is evicted (7-day idle) the worst case is one
      # digest with repeats — never missed papers.
      - name: Restore digest dedup state
        uses: actions/cache@v4
        with:
          path: data/digest_state.json
          key: digest-state-${{ github.run_id }}
          restore-keys: |
            digest-state-

      - name: Validate required secrets
        id: validate-secrets
        env:
          SCQ_EMAIL_FROM: ${{ secrets.SCQ_EMAIL_FROM }}
          SCQ_EMAIL_APP_PASSWORD: ${{ secrets.SCQ_EMAIL_APP_PASSWORD }}
          SCQ_EMAIL_TO: ${{ secrets.SCQ_EMAIL_TO }}
        run: |
          missing=()
          [ -z "$SCQ_EMAIL_FROM" ]        && missing+=("SCQ_EMAIL_FROM")
          [ -z "$SCQ_EMAIL_APP_PASSWORD" ] && missing+=("SCQ_EMAIL_APP_PASSWORD")
          [ -z "$SCQ_EMAIL_TO" ]          && missing+=("SCQ_EMAIL_TO")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: the following repository secrets are missing or empty:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            echo "Go to Settings → Secrets and variables → Actions to add them."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Install scq (with feedparser, jsonschema, tomli backport) so the
        # digest script can read recipients from data/user_config/digest.json
        # via scq.config.user.load_config. Falls back to the SCQ_EMAIL_TO
        # secret if no user override is checked in.
        run: pip install .

      - name: Run arXiv digest
        id: run-digest
        env:
          SCQ_EMAIL_FROM: ${{ secrets.SCQ_EMAIL_FROM }}
          SCQ_EMAIL_APP_PASSWORD: ${{ secrets.SCQ_EMAIL_APP_PASSWORD }}
          SCQ_EMAIL_TO: ${{ secrets.SCQ_EMAIL_TO }}
        run: |
          # Manual trigger: use the selected days_back value.
          # Scheduled trigger: 7 days — a wide, overlapping window so a
          # failed or empty run is always recovered by the next one.
          # Cross-run dedup (data/digest_state.json) prevents the wide
          # window from re-emailing papers already sent.
          if [ -n "${{ github.event.inputs.days_back }}" ]; then
            DAYS="${{ github.event.inputs.days_back }}"
          else
            DAYS=7
          fi
          echo "Looking back $DAYS day(s)"
          python tools/arxiv_digest.py --days $DAYS --max-results 1000 --smart-weekend --require-email

      # Note: digests are no longer committed to the repo (2026-05-01).
      # They live as a 30-day workflow artifact (downloadable from the run
      # page) and are also emailed to recipients by `tools/arxiv_digest.py`.
      # Locally-generated digests go to `paths().digests_dir`, which the
      # user's `data/user_config/paths.toml` can point at OneDrive.
      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digests/
          retention-days: 30

      # No explicit save step needed: actions/cache automatically saves the
      # path at job end under the primary key (digest-state-<run_id>), which
      # is always new, so each successful run snapshots the updated state.

      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VALIDATE_OUTCOME: ${{ steps.validate-secrets.outcome }}
          DIGEST_OUTCOME: ${{ steps.run-digest.outcome }}
        run: |
          # Ensure the digest-failure label exists (idempotent)
          gh label create "digest-failure" \
            --description "Automated digest pipeline failure" \
            --color "D93F0B" \
            --repo "${{ github.repository }}" \
            2>/dev/null || true

          # Determine failure mode and compose title + body
          if [ "$VALIDATE_OUTCOME" = "failure" ]; then
            TITLE="Digest pipeline: missing secrets"
            BODY=$(cat <<EOF
          The daily arXiv digest workflow failed because repository secrets are missing.

          Fix: Go to Settings > Secrets > Actions and add:
          - SCQ_EMAIL_FROM (Gmail sender address)
          - SCQ_EMAIL_APP_PASSWORD (Gmail App Password)
          - SCQ_EMAIL_TO (recipient address)

          This usually happens after a repo recreate (filter-repo, transfer, etc).

          Run: ${RUN_URL}
          EOF
          )
          elif [ "$DIGEST_OUTCOME" = "failure" ]; then
            TITLE="Digest pipeline: email delivery failed"
            BODY=$(cat <<EOF
          The daily digest fetched papers successfully but email delivery failed.

          Possible causes:
          - Gmail App Password expired or revoked (regenerate at https://myaccount.google.com/apppasswords)
          - Gmail account security event (new device, suspicious activity)
          - Temporary SMTP outage (re-run the workflow manually)

          Run: ${RUN_URL}
          EOF
          )
          else
            TITLE="Digest pipeline: unexpected failure"
            BODY=$(cat <<EOF
          The daily arXiv digest workflow failed at an unexpected step.
          Check the run log for details.

          Run: ${RUN_URL}
          EOF
          )
          fi

          # Search for an existing open issue with label digest-failure
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "digest-failure" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Commenting on existing issue #${EXISTING}"
            gh issue comment "$EXISTING" \
              --repo "${{ github.repository }}" \
              --body "${BODY}"
          else
            echo "Creating new issue: ${TITLE}"
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label "digest-failure"
          fi
